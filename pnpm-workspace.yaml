packages:
  - "apps/*"
  - "packages/*"

# "onlyBuiltDependencies" (array) não tem efeito nesta versão do pnpm
# (11.11.0) -- confirmado empiricamente: um "pnpm install --frozen-lockfile"
# limpo ainda bloqueia os scripts de build dessas dependencias mesmo
# com a lista presente. "allowBuilds" (mapa) e a chave que de fato
# funciona; sem isso, build fresco (Docker/CI) falha com
# ERR_PNPM_IGNORED_BUILDS e exit code 1.
allowBuilds:
  '@swc/core': true
  msgpackr-extract: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true

# Monorepo do MVP de Gerenciamento de Plantões Médicos (BP-2026-07-10-002)
# apps/web    -> Next.js 15 (Portal Médico + Portal Admin)
# apps/api    -> NestJS (monólito modular)
# packages/shared -> tipos e utilitários compartilhados entre web e api

catalog:
  typescript: ^5.7.2
