# Deploy reproduzível (T-5.3.2) — apps/web, apps/api, worker de
# notificações, PostgreSQL e Redis.
#
# Uso:
#   cp infra/.env.example infra/.env   # preencher os valores (nunca commitar infra/.env)
#   docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
#
# Nenhum segredo está hardcoded neste arquivo — todo valor sensível
# vem de infra/.env (gitignored) via interpolação ${VAR}, sem
# fallback. Ver infra/.env.example para a lista completa e o que
# cada variável significa.
#
# "migrate" é um serviço one-off: aplica migrations do Prisma e
# define a senha da role de runtime "plantoes_app", depois sai
# (exit 0). "api" e "worker" só sobem depois dele terminar com
# sucesso (condition: service_completed_successfully) — é isso que
# torna "docker compose up" um único comando funcional numa máquina
# limpa, sem passo manual adicional.

name: plantoes-medicos-saas

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: plantoes_medicos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plantoes_medicos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    image: plantoes-api:${PLANTOES_IMAGE_TAG:-local}
    command: ["/usr/local/bin/entrypoint-migrate.sh"]
    environment:
      DATABASE_URL_MIGRATE: "postgresql://postgres:${POSTGRES_SUPERUSER_PASSWORD}@postgres:5432/plantoes_medicos?schema=public"
      PLANTOES_APP_DB_PASSWORD: ${PLANTOES_APP_DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    image: plantoes-api:${PLANTOES_IMAGE_TAG:-local}
    environment:
      DATABASE_URL: "postgresql://plantoes_app:${PLANTOES_APP_DB_PASSWORD}@postgres:5432/plantoes_medicos?schema=public"
      PORT: "3001"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3001/auth/callback}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      REDIS_URL: "redis://redis:6379"
      NOTIFICATIONS_WORKER_ENABLED: "false"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    image: plantoes-api:${PLANTOES_IMAGE_TAG:-local}
    environment:
      DATABASE_URL: "postgresql://plantoes_app:${PLANTOES_APP_DB_PASSWORD}@postgres:5432/plantoes_medicos?schema=public"
      PORT: "3002"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_URL: "redis://redis:6379"
      NOTIFICATIONS_WORKER_ENABLED: "true"
      NOTIFICATIONS_MAX_ATTEMPTS: ${NOTIFICATIONS_MAX_ATTEMPTS:-5}
      NOTIFICATIONS_BACKOFF_MS: ${NOTIFICATIONS_BACKOFF_MS:-2000}
      NOTIFICATIONS_POLL_INTERVAL_MS: ${NOTIFICATIONS_POLL_INTERVAL_MS:-1000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    image: plantoes-web:${PLANTOES_IMAGE_TAG:-local}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
